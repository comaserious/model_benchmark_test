<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vLLM Benchmark</title>
  <link rel="stylesheet" href="benchmark.css">
</head>
<body>
  <div class="container">
    <h1>vLLM Pod Benchmark</h1>

    <!-- Input Form -->
    <section class="card form-card">
      <h2>Benchmark Settings</h2>
      <form id="benchmarkForm">
        <!-- Mode Toggle -->
        <div class="mode-toggle">
          <button type="button" class="mode-btn active" data-mode="runpod">RunPod</button>
          <button type="button" class="mode-btn" data-mode="api">API</button>
        </div>
        <input type="hidden" id="mode" value="runpod">

        <!-- RunPod Fields -->
        <div id="runpodFields">
          <div class="form-row">
            <div class="form-group">
              <label for="urlId">URL ID</label>
              <input type="text" id="urlId" placeholder="e.g. abc123def">
            </div>
            <div class="form-group">
              <label for="gpu">GPU</label>
              <select id="gpu">
                <option value="">Select GPU</option>
                <option value="A100">A100</option>
                <option value="H100">H100</option>
                <option value="A40">A40</option>
                <option value="L40">L40</option>
                <option value="L40S">L40S</option>
                <option value="RTX5090">RTX 5090</option>
                <option value="RTX4090">RTX 4090</option>
                <option value="RTX3090">RTX 3090</option>
              </select>
            </div>
          </div>
        </div>

        <!-- API Fields -->
        <div id="apiFields" class="hidden">
          <div class="form-row">
            <div class="form-group">
              <label for="provider">Provider</label>
              <select id="provider">
                <option value="OpenAI">OpenAI</option>
                <option value="Google">Google</option>
                <option value="Custom">Custom</option>
              </select>
            </div>
            <div class="form-group">
              <label for="apiModel">Model</label>
              <input type="text" id="apiModel" placeholder="e.g. gpt-4.1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="apiBase">API Base URL</label>
              <input type="text" id="apiBase" placeholder="https://api.openai.com">
            </div>
            <div class="form-group">
              <label for="apiKey">API Key</label>
              <input type="password" id="apiKey" placeholder="sk-...">
            </div>
          </div>
        </div>

        <!-- Common Fields -->
        <div class="form-row">
          <div class="form-group">
            <label for="rounds">Rounds</label>
            <input type="number" id="rounds" value="3" min="1" max="20">
          </div>
          <div class="form-group">
            <label for="maxTokens">Max Tokens</label>
            <input type="number" id="maxTokens" value="256" min="1" max="4096">
          </div>
        </div>
        <button type="submit" id="runBtn">Run Benchmark</button>
      </form>
    </section>

    <!-- Status -->
    <section class="card status-card hidden" id="statusCard">
      <div class="status-content">
        <div class="spinner"></div>
        <span id="statusText">Running benchmark...</span>
      </div>
      <div class="progress-wrap hidden" id="progressWrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel">0 / 0</div>
      </div>
      <div class="live-rounds hidden" id="liveRounds"></div>
    </section>

    <!-- Summary -->
    <section class="card result-card hidden" id="summaryCard">
      <h2>Summary</h2>
      <div class="summary-info" id="summaryInfo"></div>
      <div class="metric-grid" id="summaryMetrics"></div>
    </section>

    <!-- Round Details -->
    <section class="card result-card hidden" id="roundsCard">
      <h2>Round Details</h2>
      <table id="roundsTable">
        <thead>
          <tr>
            <th>Round</th>
            <th>TTFT (s)</th>
            <th>TPS</th>
            <th>Tokens</th>
            <th>Total (s)</th>
          </tr>
        </thead>
        <tbody id="roundsBody"></tbody>
      </table>
    </section>

    <!-- History -->
    <section class="card history-card">
      <h2>History</h2>
      <p class="history-hint">Benchmark results are saved to CSV files organized by GPU/Provider and model.</p>
      <div id="historyList"></div>
    </section>
  </div>

  <script src="benchmark.js"></script>
</body>
</html>
