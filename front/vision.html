<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="benchmark.css">
  <link rel="stylesheet" href="vision.css">
</head>
<body>
  <div class="container">

    <header class="page-header">
      <nav class="page-nav">
        <a href="benchmark.html">Benchmark</a>
        <a href="loadtest.html">Load Test</a>
        <a href="compare.html">Compare</a>
        <span class="nav-active">Vision</span>
      </nav>
      <div class="page-title-block">
        <h1>Vision Chat</h1>
        <span class="page-subtitle">vLLM 비전 모델 이미지 질의 인터페이스</span>
      </div>
    </header>

    <!-- ── 엔드포인트 설정 ────────────────────────────────────────── -->
    <section class="card endpoint-card">
      <div class="endpoint-row">
        <div class="form-group endpoint-id-group">
          <label for="runpodId">RunPod ID</label>
          <div class="endpoint-input-wrap">
            <input type="text" id="runpodId" placeholder="e.g. abc123def456" autocomplete="off" spellcheck="false">
            <span class="endpoint-suffix">-8000.proxy.runpod.net</span>
          </div>
        </div>
        <button type="button" id="connectBtn" class="connect-btn">Connect</button>
        <div id="endpointStatus" class="endpoint-status hidden">
          <span class="status-dot"></span>
          <span id="statusText"></span>
          <span id="modelLabel" class="model-label"></span>
        </div>
      </div>
    </section>

    <!-- ── 채팅 영역 ──────────────────────────────────────────────── -->
    <section class="chat-shell">

      <!-- 메시지 히스토리 -->
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>이미지 또는 텍스트로 질문하세요</p>
        </div>
      </div>

      <!-- 입력 바 -->
      <div class="chat-input-bar" id="chatInputBar">

        <!-- 이미지 첨부 미리보기 -->
        <div class="attached-image-wrap hidden" id="attachedImageWrap">
          <img id="attachedThumb" class="attached-thumb" alt="">
          <button type="button" class="attached-remove" id="removeImageBtn" title="이미지 제거">✕</button>
        </div>

        <div class="input-row">
          <!-- 이미지 첨부 버튼 -->
          <button type="button" class="attach-btn" id="attachBtn" title="이미지 첨부">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" class="hidden">

          <!-- 텍스트 입력 -->
          <textarea id="questionInput" class="question-input" rows="1"
            placeholder="메시지를 입력하세요… (Shift+Enter 줄바꿈, Enter 전송)"
            spellcheck="false"></textarea>

          <!-- 전송 버튼 -->
          <button type="button" id="sendBtn" class="send-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>

        <!-- 드래그 오버레이 -->
        <div class="drag-overlay hidden" id="dragOverlay">
          <span>이미지를 놓으세요</span>
        </div>

      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="vision.js"></script>
</body>
</html>
